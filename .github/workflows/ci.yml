name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      # Prisma 7 carrega prisma.config.ts no generate; não conecta ao banco no CI.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/msimulation_xml_ci?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm lint

      - name: Build backend packages
        run: pnpm --filter @msimulation-xml/fiscal-core build && pnpm --filter @msimulation-xml/nfe-xml build

      - name: Generate Prisma client
        run: pnpm --filter @msimulation-xml/backend exec prisma generate

      - name: Typecheck backend
        run: pnpm --filter @msimulation-xml/backend build

      - name: Backend tests
        run: pnpm test:backend

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true
