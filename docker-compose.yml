# Infra local: PostgreSQL para o Prisma (backend).
# Uso: pnpm docker:up  →  configure backend/.env  →  pnpm db:setup

services:
  postgres:
    image: postgres:16-alpine
    container_name: msimulation-xml-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-msimulation}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-msimulation}
      POSTGRES_DB: ${POSTGRES_DB:-msimulation_xml}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  fiscal-validator-api:
    image: ghcr.io/dehor-labs/mcp-fiscal-brasil:latest
    container_name: msimulation-xml-fiscal-validator
    restart: unless-stopped
    ports:
      - "${FISCAL_VALIDATOR_PORT:-8080}:8000"
    environment:
      MCP_FISCAL_LOG_LEVEL: INFO
    command: ["mcp-fiscal-api"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    name: msimulation-xml-postgres-data
