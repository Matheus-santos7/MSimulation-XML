# Blueprint Render — API Fastify + PostgreSQL + Validador MCP
# Docs: https://render.com/docs/blueprint-spec
#
# IMPORTANTE: alterar este arquivo NÃO cria serviços automaticamente se o projeto
# já existia no Render. Para novos recursos:
#   1) Dashboard → Blueprints → Sync (se houver blueprint), OU
#   2) Criar manualmente o web service do validador (ver README / instruções abaixo).
#
# Deploy automático: push na branch `main` dispara build + deploy (autoDeployTrigger).
# Frontend em produção: https://msimulation-xml.vercel.app

services:
  # Validador MCP — criar manualmente se não existir após sync do blueprint.
  - type: web
    name: msimulation-xml-fiscal-validator
    runtime: docker
    repo: https://github.com/Matheus-santos7/MSimulation-XML
    branch: main
    autoDeployTrigger: commit
    dockerfilePath: ./Dockerfile.fiscal-validator
    dockerContext: .
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: MCP_FISCAL_LOG_LEVEL
        value: INFO

  - type: web
    name: msimulation-xml-api
    runtime: docker
    repo: https://github.com/Matheus-santos7/MSimulation-XML
    branch: main
    autoDeployTrigger: commit
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: starter
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: HOST
        value: 0.0.0.0
      - key: TRUST_PROXY
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: msimulation-xml-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PASSWORD_PEPPER
        generateValue: true
      - key: CORS_ORIGINS
        value: https://msimulation-xml.vercel.app
      - key: APP_PUBLIC_URL
        value: https://msimulation-xml.vercel.app
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: REQUIRE_EMAIL_VERIFICATION
        value: "false"
      - key: FISCAL_VALIDATOR_ENABLED
        value: "true"
      - key: FISCAL_VALIDATOR_URL
        fromService:
          type: web
          name: msimulation-xml-fiscal-validator
          property: hostport

databases:
  - name: msimulation-xml-db
    plan: basic-256mb
    databaseName: msimulation_xml
    user: msimulation
